name: Build Android APK (Release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-gui:
    runs-on: ubuntu-22.04
    outputs:
      gui-built: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch scratch-gui repository
        run: |
          if [ -d scratch-gui ]; then
            cd scratch-gui && git pull origin develop
          else
            git clone -b develop --single-branch https://github.com/Bilup/scratch-gui.git
          fi

      - name: Cache scratch-gui dependencies
        uses: actions/cache@v4
        id: scratch-gui-cache
        with:
          path: scratch-gui/node_modules
          key: ${{ runner.os }}-scratch-gui-${{ hashFiles('scratch-gui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-scratch-gui-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          cache: true

      - name: Install scratch-gui dependencies (if cache miss)
        if: steps.scratch-gui-cache.outputs.cache-hit != 'true'
        run: cd scratch-gui && bun install

      - name: Build scratch-gui
        run: cd scratch-gui && bun run build

      - name: Sync Capacitor and copy web assets
        run: |
          npx cap copy
          npx cap sync android

      - name: Upload Android project
        uses: actions/upload-artifact@v4
        with:
          name: android-project
          path: android/
          retention-days: 1

  build-apk:
    needs: build-gui
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - arch: x64
            abi: x86_64
          - arch: x86
            abi: x86

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android SDK to PATH
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Download Android project
        uses: actions/download-artifact@v4
        with:
          name: android-project
          path: android/

      - name: Create local.properties for Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Generate PKCS12 Keystore
        run: |
          keytool -genkeypair -v -keystore android/app/release.keystore \
            -alias ${{ secrets.KEY_ALIAS }} \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -dname "CN=Bilup, OU=Bilup, O=Bilup, L=Beijing, ST=Beijing, C=CN" \
            -storetype PKCS12

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK (Release - ${{ matrix.arch }})
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --parallel --build-cache -x test -x lint -Pandroid.defaultConfig.ndk.abiFilters=${{ matrix.abi }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Release APK (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ matrix.arch }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  publish-release:
    needs: build-apk
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download x64 APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-x64
          path: ./apks/

      - name: Download x86 APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk-x86
          path: ./apks/

      - name: List APK files
        run: ls -la ./apks/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Bilup Android App Release

            ### Downloads
            - **x64**: `app-x86_64-release.apk`
            - **x86**: `app-x86-release.apk`

            ### Changes
            - Built from tag: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
          files: |
            ./apks/*.apk
          draft: false
          prerelease: false
