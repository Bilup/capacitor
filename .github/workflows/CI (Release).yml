name: CI (Release)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-gui:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    outputs:
      gui-built: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch scratch-gui repository
        timeout-minutes: 15
        run: |
          if [ -d scratch-gui ]; then
            cd scratch-gui && git pull origin develop || git clone -b develop --single-branch --depth 1 https://github.com/Bilup/scratch-gui.git scratch-gui-temp && rm -rf scratch-gui && mv scratch-gui-temp scratch-gui
          else
            git clone -b develop --single-branch --depth 1 https://github.com/Bilup/scratch-gui.git
          fi

      - name: Cache scratch-gui dependencies
        uses: actions/cache@v4
        id: scratch-gui-cache
        with:
          path: scratch-gui/node_modules
          key: ${{ runner.os }}-scratch-gui-${{ hashFiles('scratch-gui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-scratch-gui-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          cache: true

      - name: Install scratch-gui dependencies (if cache miss)
        if: steps.scratch-gui-cache.outputs.cache-hit != 'true'
        timeout-minutes: 15
        run: cd scratch-gui && bun install

      - name: Build scratch-gui
        timeout-minutes: 20
        run: cd scratch-gui && bun run build

      - name: Sync Capacitor and copy web assets
        run: |
          npx cap copy
          npx cap sync android

      - name: Upload Android project
        uses: actions/upload-artifact@v4
        with:
          name: android-project
          path: android/
          retention-days: 1

  build-apk-phone:
    needs: build-gui
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android SDK to PATH
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Download Android project
        uses: actions/download-artifact@v4
        with:
          name: android-project
          path: android/

      - name: Create local.properties for Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Remove existing keystore if present
        run: rm -f android/app/release.keystore

      - name: Generate PKCS12 Keystore
        run: |
          keytool -genkeypair -v -keystore android/app/release.keystore \
            -alias ${{ secrets.KEY_ALIAS }} \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -dname "CN=Bilup, OU=Bilup, O=Bilup, L=Beijing, ST=Beijing, C=CN" \
            -storetype PKCS12

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK (Release - Phone)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assemblePhoneRelease --no-daemon --parallel --build-cache -x test -x lint
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Release APK (Phone)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-phone
          path: android/app/build/outputs/apk/phone/release/*.apk
          retention-days: 30

  build-apk-tablet:
    needs: build-gui
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android SDK to PATH
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Download Android project
        uses: actions/download-artifact@v4
        with:
          name: android-project
          path: android/

      - name: Create local.properties for Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Remove existing keystore if present
        run: rm -f android/app/release.keystore

      - name: Generate PKCS12 Keystore
        run: |
          keytool -genkeypair -v -keystore android/app/release.keystore \
            -alias ${{ secrets.KEY_ALIAS }} \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -dname "CN=Bilup, OU=Bilup, O=Bilup, L=Beijing, ST=Beijing, C=CN" \
            -storetype PKCS12

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK (Release - Tablet)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleTabletRelease --no-daemon --parallel --build-cache -x test -x lint
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Release APK (Tablet)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-tablet
          path: android/app/build/outputs/apk/tablet/release/*.apk
          retention-days: 30

  publish-release:
    needs: [build-apk-phone, build-apk-tablet]
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download Phone APKs
        uses: actions/download-artifact@v4
        with:
          name: release-apk-phone
          path: ./apks/

      - name: Download Tablet APKs
        uses: actions/download-artifact@v4
        with:
          name: release-apk-tablet
          path: ./apks/

      - name: List APK files
        run: ls -la ./apks/

      - name: Upload to GitHub Releases
        shell: bash
        run: |
          node scripts/upload-to-github-releases.mjs \
            "${{ github.repository_owner }}" \
            "${{ github.event.repository.name }}" \
            "apks/**/*.apk"
        env:
          GH_TOKEN: "${{ github.token }}"
