name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android SDK to PATH
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Run prebuild (sync Capacitor)
        run: npm run prebuild

      - name: Sync Capacitor plugins
        run: npx cap sync android

      - name: Create local.properties for Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Decode Keystore
        run: |
          echo "$KEYSTORE_FILE" | base64 -d > android/app/release.keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}

      - name: Add signing config to build.gradle
        run: |
          if grep -q "signingConfig signingConfigs.release" android/app/build.gradle; then
            echo "Signing config already exists"
          else
            sed -i 's/signningConfig signingConfigs.release/signingConfig signingConfigs.release/g' android/app/build.gradle
            sed -i '/buildTypes {/,/release {/ { /release {/a\            signingConfig signingConfigs.release
            }' android/app/build.gradle
          fi

      - name: Create signing.gradle
        run: |
          cat > android/signing.gradle << 'EOF'
          android.signingConfigs {
              release {
                  storeFile file('release.keystore')
                  storePassword System.getenv("KEYSTORE_PASSWORD")
                  keyAlias System.getenv("KEY_ALIAS")
                  keyPassword System.getenv("KEY_PASSWORD")
              }
          }
          EOF
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Apply signing.gradle
        run: |
          if ! grep -q "apply from: '../signing.gradle'" android/app/build.gradle; then
            sed -i "/apply plugin: 'com.android.application'/a\\
          apply from: '../signing.gradle'
          " android/app/build.gradle
          fi

      - name: Build Android APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
