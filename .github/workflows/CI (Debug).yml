name: Build Android APK (Debug)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-gui:
    runs-on: ubuntu-22.04
    outputs:
      gui-built: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch scratch-gui repository
        run: |
          if [ -d scratch-gui ]; then
            cd scratch-gui && git pull origin develop
          else
            git clone -b develop --single-branch https://github.com/Bilup/scratch-gui.git
          fi

      - name: Cache scratch-gui dependencies
        uses: actions/cache@v4
        id: scratch-gui-cache
        with:
          path: scratch-gui/node_modules
          key: ${{ runner.os }}-scratch-gui-${{ hashFiles('scratch-gui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-scratch-gui-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          cache: true

      - name: Install scratch-gui dependencies (if cache miss)
        if: steps.scratch-gui-cache.outputs.cache-hit != 'true'
        run: cd scratch-gui && bun install

      - name: Build scratch-gui
        run: cd scratch-gui && bun run build

      - name: Sync Capacitor and copy web assets
        run: |
          npx cap copy
          npx cap sync android

      - name: Upload Android project
        uses: actions/upload-artifact@v4
        with:
          name: android-project
          path: android/
          retention-days: 1

  build-apk-phone:
    needs: build-gui
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android SDK to PATH
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Download Android project
        uses: actions/download-artifact@v4
        with:
          name: android-project
          path: android/

      - name: Create local.properties for Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK (Debug - Phone)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assemblePhoneDebug --no-daemon --parallel --build-cache -x test -x lint
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK (Phone)
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-phone
          path: android/app/build/outputs/apk/phone/debug/*.apk
          retention-days: 14

  build-apk-tablet:
    needs: build-gui
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android SDK to PATH
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Download Android project
        uses: actions/download-artifact@v4
        with:
          name: android-project
          path: android/

      - name: Create local.properties for Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Android APK (Debug - Tablet)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleTabletDebug --no-daemon --parallel --build-cache -x test -x lint
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK (Tablet)
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-tablet
          path: android/app/build/outputs/apk/tablet/debug/*.apk
          retention-days: 14
