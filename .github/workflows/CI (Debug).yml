name: CI (Debug)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:



jobs:
  build-gui:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      gui-built: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
        timeout-minutes: 5

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Fetch scratch-gui repository
        timeout-minutes: 15
        run: |
          if [ -d scratch-gui ]; then
            cd scratch-gui
            if ! git pull origin develop; then
              cd ..
              rm -rf scratch-gui
              git clone -b develop --single-branch --depth 1 https://github.com/Bilup/scratch-gui.git
            fi
          else
            git clone -b develop --single-branch --depth 1 https://github.com/Bilup/scratch-gui.git
          fi

      - name: Cache scratch-gui dependencies
        uses: actions/cache@v4
        id: scratch-gui-cache
        with:
          path: scratch-gui/node_modules
          key: ${{ runner.os }}-scratch-gui-${{ hashFiles('scratch-gui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-scratch-gui-
        timeout-minutes: 5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          cache: true
        timeout-minutes: 5

      - name: Install scratch-gui dependencies (if cache miss)
        if: steps.scratch-gui-cache.outputs.cache-hit != 'true'
        timeout-minutes: 15
        run: cd scratch-gui && bun install

      - name: Patch scratch-gui 'fractch' typo (temporary build fix)
        # scratch-gui (Bilup fork, develop) has a typo importing a non-existent
        # module 'fractch' from src/lib/git, which breaks the webpack build.
        # This step removes the bad import line so the build can proceed.
        # TODO: fix the spelling in github.com/Bilup/scratch-gui and remove this step.
        continue-on-error: true
        timeout-minutes: 5
        run: |
          DIR="scratch-gui/src/lib/git"
          if [ -d "$DIR" ]; then
            echo "Scanning $DIR for 'fractch' imports..."
            matches=$(grep -rl "fractch" "$DIR" --include=*.js --include=*.jsx --include=*.ts --include=*.tsx 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "Found 'fractch' references, removing import lines:"
              echo "$matches"
              for f in $matches; do
                sed -i "/['\"]fractch['\"]/d" "$f"
              done
              echo "Patched."
            else
              echo "No 'fractch' references found, nothing to patch."
            fi
          else
            echo "$DIR not present, skipping patch."
          fi

      - name: Build scratch-gui
        timeout-minutes: 20
        run: cd scratch-gui && bun run build

      - name: Sync Capacitor and copy web assets
        timeout-minutes: 10
        run: |
          npx cap copy
          npx cap sync android

      - name: Upload Android project
        uses: actions/upload-artifact@v4
        with:
          name: android-project
          path: android/
          retention-days: 1
        timeout-minutes: 5

  build-apk:
    needs: build-gui
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        timeout-minutes: 5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
        timeout-minutes: 5

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
        timeout-minutes: 10

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "build-tools;35.0.0 platforms;android-35"
        timeout-minutes: 15

      - name: Add Android SDK to PATH
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/build-tools/35.0.0" >> $GITHUB_PATH
        timeout-minutes: 2

      - name: Download Android project
        uses: actions/download-artifact@v4
        with:
          name: android-project
          path: android/
        timeout-minutes: 5

      - name: Create local.properties for Android SDK
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties
        timeout-minutes: 2

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
        timeout-minutes: 5

      - name: Build Android APKs (Debug - Phone & Tablet)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assemblePhoneDebug assembleTabletDebug --no-daemon --parallel --build-cache -x test -x lint --console=plain --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g"
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
        timeout-minutes: 40

      - name: Upload Debug APKs
        run: |
          for apk in android/app/build/outputs/apk/**/debug/*.apk; do
            filename=$(basename "$apk")
            echo "Uploading $filename"
            cp "$apk" "$filename"
          done
        timeout-minutes: 5

      - name: Upload Phone x86 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Bilup-android-phone-debug-x86
          path: Bilup-android-phone-*-x86.apk
          retention-days: 14
        timeout-minutes: 5

      - name: Upload Phone x86_64 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Bilup-android-phone-debug-x86_64
          path: Bilup-android-phone-*-64.apk
          retention-days: 14
        timeout-minutes: 5

      - name: Upload Tablet x86 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Bilup-android-tablet-debug-x86
          path: Bilup-android-tablet-*-x86.apk
          retention-days: 14
        timeout-minutes: 5

      - name: Upload Tablet x86_64 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Bilup-android-tablet-debug-x86_64
          path: Bilup-android-tablet-*-64.apk
          retention-days: 14
        timeout-minutes: 5
